name: Fetch jobs

on:
  schedule:
    # Top of every hour (UTC). GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  workflow_dispatch: {}   # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: fetch-jobs
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch jobs
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: python fetch_jobs.py

      - name: Commit updated database
        run: |
          git config user.name  "job-bot"
          git config user.email "actions@users.noreply.github.com"
          git add jobs.db
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update jobs $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
